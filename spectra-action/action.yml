name: 'Spectra Account-Validation Regression Gate'
description: 'Block a Solana program upgrade PR that removes or weakens an account-validation guard the deployed version enforced'
author: 'Ayodya'
branding:
  icon: 'shield'
  color: 'purple'

inputs:
  baseline:
    description: 'Path to the baseline (last released / on-chain) program source tree'
    required: true
  candidate:
    description: 'Path to the candidate (upgrade under review) program source tree'
    required: true
  report-path:
    description: 'Where to write the report'
    required: false
    default: 'spectra-report.json'
  format:
    description: 'Output format passed to spectra (json, markdown, or sarif)'
    required: false
    default: 'json'
  fail-on-breaking:
    description: 'If true, the step fails when any breaking regression is reported'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cargo cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ${{ github.action_path }}/..

    - name: Build Spectra
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: cargo build --release --bin spectra

    - name: Run Spectra check
      shell: bash
      run: |
        set -e
        BASELINE="${{ inputs.baseline }}"
        CANDIDATE="${{ inputs.candidate }}"
        REPORT="${{ inputs.report-path }}"
        FORMAT="${{ inputs.format }}"
        BIN="${{ github.action_path }}/../target/release/spectra"

        if [ "${{ inputs.fail-on-breaking }}" = "true" ]; then
          "$BIN" check --baseline "$BASELINE" --candidate "$CANDIDATE" --report "$REPORT" --format "$FORMAT"
        else
          "$BIN" check --baseline "$BASELINE" --candidate "$CANDIDATE" --report "$REPORT" --format "$FORMAT" || true
        fi
