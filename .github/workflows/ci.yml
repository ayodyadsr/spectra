name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Build, lint, test, demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release --workspace

      - name: Test
        run: cargo test --release --workspace

      - name: Demo run (markdown)
        run: |
          ./target/release/spectra check \
            --old examples/lending_v1.json \
            --new examples/lending_v2.json \
            --format markdown \
            --report spectra-demo-report.md || EXIT=$?
          echo "Spectra exit code: ${EXIT:-0} (expected 1 for breaking findings)"
          test "${EXIT:-0}" = "1" || (echo "Expected non-zero exit on synthetic regression demo"; exit 1)

      - name: Demo run (json)
        run: |
          ./target/release/spectra check \
            --old examples/lending_v1.json \
            --new examples/lending_v2.json \
            --format json \
            --report spectra-demo-report.json || true

      - name: Identical-IDL exit-0 check (no false positives)
        run: |
          ./target/release/spectra check \
            --old examples/lending_v1.json \
            --new examples/lending_v1.json \
            --format markdown > /dev/null
          echo "Identical-IDL run exited 0 as required."

      - name: SARIF output smoke check
        run: |
          ./target/release/spectra check \
            --old examples/lending_v1.json \
            --new examples/lending_v2.json \
            --format sarif \
            --report spectra-demo-report.sarif || EXIT=$?
          test "${EXIT:-0}" = "1" || (echo "Expected exit 1 on synthetic regression in SARIF mode"; exit 1)
          python3 -c "import json,sys; d=json.load(open('spectra-demo-report.sarif')); assert d['version']=='2.1.0', 'bad SARIF version'; assert d['runs'][0]['tool']['driver']['name']=='Spectra'; assert len(d['runs'][0]['results'])>=6, 'expected >=6 results'; print('SARIF OK: '+str(len(d['runs'][0]['results']))+' results')"

      - name: Quiet-mode exit-2 check (unknown --format)
        run: |
          set +e
          ./target/release/spectra check \
            --old examples/lending_v1.json \
            --new examples/lending_v2.json \
            --format definitely-not-a-format > /dev/null 2>&1
          EXIT=$?
          set -e
          test "$EXIT" = "2" || (echo "Expected exit 2 on invocation error, got $EXIT"; exit 1)
          echo "Invocation error exited 2 as required."

      - name: Quiet-mode no-output-on-clean check
        run: |
          OUT=$(./target/release/spectra check \
            --old examples/lending_v1.json \
            --new examples/lending_v1.json \
            --format markdown --quiet)
          test -z "$OUT" || (echo "Expected --quiet on clean run to produce empty stdout"; exit 1)
          echo "--quiet suppressed stdout on clean run as required."

      - name: Upload demo report
        uses: actions/upload-artifact@v4
        with:
          name: spectra-demo-report
          path: |
            spectra-demo-report.md
            spectra-demo-report.json
            spectra-demo-report.sarif

  docker:
    name: Docker build + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: spectra:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke — synthetic regression exits 1
        run: |
          set +e
          docker run --rm spectra:ci check \
            --old /examples/lending_v1.json \
            --new /examples/lending_v2.json \
            --format markdown > /dev/null
          EXIT=$?
          set -e
          test "$EXIT" = "1" || (echo "Expected exit 1 from container demo, got $EXIT"; exit 1)
          echo "Container demo exited 1 as required."

      - name: Smoke — identical IDL exits 0 (no false positives)
        run: |
          docker run --rm spectra:ci check \
            --old /examples/lending_v1.json \
            --new /examples/lending_v1.json \
            --format markdown > /dev/null
          echo "Container identical-IDL run exited 0 as required."
