name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Build, lint, test, demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release --workspace

      - name: Test
        run: cargo test --release --workspace

      - name: Demo run (markdown)
        run: |
          ./target/release/spectra check \
            --old examples/lending_v1.json \
            --new examples/lending_v2.json \
            --format markdown \
            --report spectra-demo-report.md || EXIT=$?
          echo "Spectra exit code: ${EXIT:-0} (expected 1 for breaking findings)"
          test "${EXIT:-0}" = "1" || (echo "Expected non-zero exit on synthetic regression demo"; exit 1)

      - name: Demo run (json)
        run: |
          ./target/release/spectra check \
            --old examples/lending_v1.json \
            --new examples/lending_v2.json \
            --format json \
            --report spectra-demo-report.json || true

      - name: Upload demo report
        uses: actions/upload-artifact@v4
        with:
          name: spectra-demo-report
          path: |
            spectra-demo-report.md
            spectra-demo-report.json
